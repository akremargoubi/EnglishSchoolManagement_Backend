# PORT (use 8084 - frontend expects this)
server.port=8084

# SERVICE NAME (EUREKA)
spring.application.name=ENROLLMENT-SERVICE

# DATABASE H2
spring.datasource.url=jdbc:h2:file:./data/enrollmentdb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

spring.h2.console.enabled=true
spring.h2.console.path=/h2

# EUREKA (optional - service runs without Eureka)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Kafka (optional - disable if Kafka not running; exclude if not used)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
spring.kafka.consumer.group-id=enrollment-service
spring.kafka.consumer.auto-offset-reset=earliest
app.kafka.topics.course-events=course-events
