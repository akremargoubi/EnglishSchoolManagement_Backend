spring.application.name=COURSE-SERVICE

# Disable Redis auto-config (use Caffeine cache). Enable Redis with: -Dspring.autoconfigure.exclude=
# Or remove this line and run Redis on localhost:6379
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
server.port=8083

# H2 DATABASE - In-memory (avoids file lock; fresh data on each restart)
spring.datasource.url=jdbc:h2:mem:coursedb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

spring.h2.console.enabled=true
spring.h2.console.path=/h2

# EUREKA CONFIG (optional - service runs without Eureka)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
eureka.instance.prefer-ip-address=true

# CACHE - Caffeine in-memory by default. Use profile 'redis' for Redis.

# SWAGGER
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# FILE UPLOAD (max 200 MB)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
# Allow long uploads (10 min) for large files
server.tomcat.connection-timeout=600000