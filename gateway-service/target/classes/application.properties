# ===============================
# SERVER
# ===============================
server.port=8080
spring.application.name=gateway-service

# ===============================
# EUREKA CLIENT
# ===============================
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ===============================
# ROUTES
# ===============================

# --- Auth Service (port 1999) ---
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**,/api/users/**

# --- Assessment Service (port 8081) ---
spring.cloud.gateway.server.webflux.routes[1].id=assessment-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://ASSESSMENT-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/assessments/**

spring.cloud.gateway.server.webflux.routes[2].id=enums-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://ASSESSMENT-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/enums/**

# --- Resources Service (port 8096) ---
spring.cloud.gateway.server.webflux.routes[3].id=resources-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://RESOURCES-SERVICE
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/resources/**

# --- Attendance Service ---
spring.cloud.gateway.server.webflux.routes[4].id=attendance-service
spring.cloud.gateway.server.webflux.routes[4].uri=lb://ATTENDANCE-SERVICE
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/attendances/**

# --- Schedule Service (port 8888) ---
spring.cloud.gateway.server.webflux.routes[5].id=schedule-service
spring.cloud.gateway.server.webflux.routes[5].uri=lb://SCHEDULE-SERVICE
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/api/schedules/**

# --- Planning Service ---
spring.cloud.gateway.server.webflux.routes[6].id=planning-service
spring.cloud.gateway.server.webflux.routes[6].uri=lb://PLANNING-SERVICE
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/api/planning/**

# --- Course Service (port 8083) ---
spring.cloud.gateway.server.webflux.routes[7].id=course-service
spring.cloud.gateway.server.webflux.routes[7].uri=lb://COURSE-SERVICE
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/api/v1/courses/**,/api/v1/categories/**,/api/v1/instructors/**,/api/v1/lessons/**,/api/v1/modules/**

# --- Enrollment Service (port 8084) ---
spring.cloud.gateway.server.webflux.routes[8].id=enrollment-service
spring.cloud.gateway.server.webflux.routes[8].uri=lb://ENROLLMENT-SERVICE
spring.cloud.gateway.server.webflux.routes[8].predicates[0]=Path=/api/v1/enrollments/**

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=*
